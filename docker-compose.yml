name: kintai_system_b

services:
  db:
    image: mysql:8.0
    container_name: kintai_system_b_db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
